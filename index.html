<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITALCHECK UANL PRO+</title>
    <style>
        :root { --uanl-blue: #004a8d; --uanl-gold: #ffcc00; --oxigeno: #00d4ff; --ritmo: #ff3366; --estres: #a255ff; --pulso: #00ff88; }
        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 15px; }
        .watch-face { background: linear-gradient(145deg, #001a33, #000); border: 8px solid var(--uanl-blue); border-radius: 50px; padding: 20px; max-width: 360px; margin: auto; box-shadow: 0 0 40px rgba(0, 74, 141, 0.4); }
        .brand { color: var(--uanl-gold); font-size: 1.3rem; margin-bottom: 5px; }
        .sub-brand { color: white; font-size: 0.75rem; margin-bottom: 15px; border-bottom: 2px solid var(--uanl-gold); padding-bottom: 8px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: rgba(255, 255, 255, 0.06); padding: 12px; border-radius: 15px; text-align: left; border-bottom: 3px solid var(--uanl-blue); }
        .stat-card.full { grid-column: span 2; }
        .label { font-size: 0.6rem; color: var(--uanl-gold); text-transform: uppercase; font-weight: bold; }
        .value { font-size: 1.6rem; font-weight: bold; display: block; }
        .status-bar { grid-column: span 2; background: var(--uanl-blue); padding: 8px; border-radius: 20px; margin-top: 12px; font-size: 0.65rem; color: var(--uanl-gold); font-weight: bold; }
        .btn-scan { grid-column: span 2; background: var(--uanl-gold); color: var(--uanl-blue); border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1rem; margin-top: 15px; cursor: pointer; width: 100%; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="watch-face">
        <div class="brand">VITALCHECK UANL PRO+</div>
        <div class="sub-brand">MONITOREO MULTI-PARÁMETRO 🐯</div>
        <div class="data-grid">
            <div class="stat-card" style="border-bottom-color: var(--ritmo);"><span class="label">❤️ Ritmo Card.</span><span class="value" id="ritmo">--</span></div>
            <div class="stat-card" style="border-bottom-color: var(--pulso);"><span class="label">🟢 Pulso</span><span class="value" id="pulso">--</span></div>
            <div class="stat-card full"><span class="label">🩺 Presión Arterial</span><span class="value" id="presion">--/--</span></div>
            <div class="stat-card"><span class="label">💧 Oxígeno</span><span class="value" id="spo2" style="color:var(--oxigeno)">--%</span></div>
            <div class="stat-card"><span class="label">🧠 Estrés</span><span class="value" id="stress" style="color:var(--estres)">--</span></div>
            <div id="status" class="status-bar">SISTEMA VINCULADO 📡</div>
            <button class="btn-scan" id="btnRun">INICIAR ESCANEO TOTAL 🐾</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        emailjs.init("VeCZdnCnq1BloNv1D");

        const firebaseConfig = {
            apiKey: "AIzaSyDDhRZNryWN07E_OptzOOAAwizePs_7tWo",
            authDomain: "vitalcheckuanl.firebaseapp.com",
            databaseURL: "https://vitalcheckuanl-default-rtdb.firebaseio.com",
            projectId: "vitalcheckuanl",
            appId: "1:215053007016:web:42e248b7c9313ef6fdaa9d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('btnRun').addEventListener('click', function() {
            const btn = this;
            btn.innerText = "ESCANEANDO...";
            
            const latidos = Math.floor(Math.random() * (95 - 65)) + 65;
            const pres = (Math.floor(Math.random() * (130 - 115)) + 115) + "/80";
            const ox = Math.floor(Math.random() * (100 - 96)) + 96;
            const est = Math.floor(Math.random() * (100 - 10)) + 10;

            document.getElementById('ritmo').innerText = latidos + " LPM";
            document.getElementById('pulso').innerText = latidos;
            document.getElementById('presion').innerText = pres;
            document.getElementById('spo2').innerText = ox + "%";
            document.getElementById('stress').innerText = est + "/100";

            database.ref('monitoreo/actual').set({
                ritmo: latidos, presion: pres, oxigeno: ox, estres: est, time: new Date().toLocaleTimeString()
            }).then(() => {
                emailjs.send("service_g3h6git", "template_nmh9554", {
                    ritmo: latidos,
                    presion: pres,
                    oxigeno: ox,
                    estres: est
                }).then(() => {
                    document.getElementById('status').innerText = "✅ REPORTE ENVIADO A ENRIQUE";
                    btn.innerText = "NUEVO ESCANEO";
                }).catch((err) => {
                    document.getElementById('status').innerText = "❌ ERROR: Revisa EmailJS";
                    console.log(err);
                });
            });
        });
    </script>
</body>
</html>
