<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITALCHECK UANL</title>
    <style>
        :root { --uanl-blue: #004a8d; --uanl-gold: #ffcc00; }
        body { font-family: sans-serif; background: #000; color: white; text-align: center; padding: 20px; }
        .watch-face { border: 5px solid var(--uanl-blue); border-radius: 30px; padding: 20px; max-width: 300px; margin: auto; }
        .value { font-size: 2rem; font-weight: bold; color: var(--uanl-gold); display: block; margin: 10px 0; }
        .btn-scan { background: var(--uanl-gold); color: var(--uanl-blue); border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="watch-face">
        <h3>VITALCHECK UANL 🐯</h3>
        <p>Ritmo Cardíaco:</p>
        <span id="ritmo" class="value">--</span>
        <p>Presión:</p>
        <span id="presion" class="value">--/--</span>
        <div id="status">SISTEMA LISTO</div>
        <br>
        <button class="btn-scan" id="btnRun">ENVIAR REPORTE</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        (function() {
            emailjs.init("VeCZdnCnq1BloNv1D");
        })();

        document.getElementById('btnRun').addEventListener('click', function() {
            const btn = this;
            btn.innerText = "ENVIANDO...";
            
            const r = Math.floor(Math.random() * (95 - 65)) + 65;
            const p = "120/80";

            document.getElementById('ritmo').innerText = r + " LPM";
            document.getElementById('presion').innerText = p;

            // Enviar correo directo
            emailjs.send("service_g3h6git", "template_nmh9554", {
                ritmo: r,
                presion: p,
                oxigeno: "98%",
                estres: "Normal"
            }).then(function() {
                document.getElementById('status').innerText = "✅ ¡ENVIADO A ENRIQUE!";
                document.getElementById('status').style.color = "#00ff00";
                btn.innerText = "ENVIAR OTRO";
            }, function(error) {
                document.getElementById('status').innerText = "❌ ERROR: " + JSON.stringify(error);
                document.getElementById('status').style.color = "#ff0000";
                btn.innerText = "REINTENTAR";
            });
        });
    </script>
</body>
</html>
